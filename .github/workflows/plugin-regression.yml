name: plugin-regression-baseline

on:
  pull_request:
    paths:
      - "backend/**"
      - "docs/PLUGIN_UPGRADE_REFACTOR_PLAN.md"
      - "docs/PLUGIN_TEST_BASELINE.md"
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "docs/PLUGIN_UPGRADE_REFACTOR_PLAN.md"
      - "docs/PLUGIN_TEST_BASELINE.md"

jobs:
  plugin-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Run plugin regression baseline
        working-directory: backend
        run: sh scripts/test_plugin_regression.sh
